name: app-build-action
#推送Tag时触发
on:
  push:
    tags:
      - "tv_*"
jobs:
  build-tv:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      #签出代码
      - uses: actions/checkout@v4
        with:
          ref: master

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      #设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      #更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_tv_app
          flutter pub get

      # 创建 debug key.properties
      - name: Create debug key.properties
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true
          cat > simple_live_tv_app/android/key.properties << EOF
          storeFile=$HOME/.android/debug.keystore
          storePassword=android
          keyPassword=android
          keyAlias=androiddebugkey
          EOF

      #打包APK (debug模式)
      - name: Build APK
        run: |
          cd simple_live_tv_app
          flutter build apk --debug

      #上传APK至Artifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_tv_debug
          path: simple_live_tv_app/build/app/outputs/flutter-apk/app-debug.apk

      #完成
      - run: echo "🍏 This job's status is ${{ job.status }}."
